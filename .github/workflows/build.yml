name: Build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
            bundles: appimage,deb
          - os: windows-latest
            label: windows
            bundles: nsis,msi

    runs-on: ${{ matrix.os }}
    name: Build · ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux system deps (WebKit2GTK + friends) ──────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Node ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust ──────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Install JS deps ───────────────────────────────────────────────────
      - run: npm ci

      # ── Build via tauri-action ────────────────────────────────────────────
      # On tag push  → creates a GitHub Release and uploads bundles.
      # On everything else → uploads bundles as workflow artifacts only.
      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles ${{ matrix.bundles }}
          # Release settings (only active when the ref is a version tag)
          tagName:      ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName:  'XLauchez ${{ github.ref_name }}'
          releaseBody:  'See the commit history for changes in this release.'
          releaseDraft: true
          prerelease:   false

      # ── Upload artifacts for non-release runs ────────────────────────────
      - name: Upload artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: xlauchez-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 14
